<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}문장 순서 맞추기{% endblock %}</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    }
 
    body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        padding: 20px;
    }
 
    .card {
        background: #fff;
        border-radius: 20px;
        padding: 40px 32px;
        max-width: 480px;
        width: 100%;
        box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
 
    h1 {
        font-size: 24px;
        color: #333;
        margin-bottom: 8px;
        text-align: center;
    }
 
    .subtitle {
        text-align: center;
        color: #888;
        font-size: 14px;
        margin-bottom: 28px;
    }
 
    textarea, input[type="text"] {
        width: 100%;
        padding: 14px 16px;
        border: 2px solid #e0e0e0;
        border-radius: 12px;
        font-size: 15px;
        resize: vertical;
        outline: none;
        transition: border-color 0.2s;
    }
 
    textarea:focus, input[type="text"]:focus {
        border-color: #764ba2;
    }
 
    button {
        width: 100%;
        margin-top: 16px;
        padding: 14px;
        border: none;
        border-radius: 12px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: #fff;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.1s, opacity 0.2s;
    }
 
    button:hover {
        opacity: 0.9;
    }
 
    button:active {
        transform: scale(0.98);
    }
 
    .progress {
        text-align: center;
        font-size: 13px;
        color: #aaa;
        margin-bottom: 16px;
        font-weight: 600;
        letter-spacing: 1px;
    }
 
    .word-count-info {
        font-size: 13px;
        color: #aaa;
        margin-bottom: 8px;
        text-align: right;
    }
 
    .word-count-info strong {
        color: #764ba2;
    }
 
    .input-wrap {
        position: relative;
    }
 
    .input-wrap input {
        padding-right: 70px;
    }
 
    .count-badge {
        position: absolute;
        right: 14px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 13px;
        font-weight: 600;
        color: #764ba2;
        pointer-events: none;
    }
 
    .shuffled-box {
        background: #f7f6fb;
        border-radius: 14px;
        padding: 20px;
        margin-bottom: 20px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: center;
    }
 
    .word-chip {
        background: #fff;
        border: 1px solid #e0d8f0;
        border-radius: 8px;
        padding: 6px 12px;
        font-size: 15px;
        color: #555;
        font-weight: 500;
        cursor: pointer;
        user-select: none;
        transition: background 0.15s, color 0.15s;
    }
 
    .word-chip.used {
        background: #555;
        color: #fff;
        border-color: #444;
    }
 
    .feedback {
        text-align: center;
        border-radius: 12px;
        padding: 14px;
        margin-bottom: 16px;
        font-size: 16px;
        font-weight: 700;
    }
 
    .feedback.correct {
        background: #e6f9ee;
        color: #1ca053;
    }
 
    .feedback.wrong {
        background: #fdecec;
        color: #e1483f;
    }
 
    .feedback .correct-answer {
        display: block;
        margin-top: 6px;
        font-size: 13px;
        font-weight: 500;
        color: #888;
    }
 
    .error {
        text-align: center;
        color: #e1483f;
        font-size: 14px;
        margin-bottom: 12px;
        font-weight: 600;
    }
 
    .result-score {
        text-align: center;
        font-size: 48px;
        font-weight: 800;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin: 20px 0;
    }
 
    .retry-btn {
        background: linear-gradient(135deg, #ff9a56 0%, #ff6b6b 100%);
    }
 
    .secondary-btn {
        background: #f0f0f0;
        color: #666;
        box-shadow: none;
    }
 
    .result-sub {
        text-align: center;
        color: #888;
        font-size: 14px;
        margin-bottom: 20px;
    }
</style>
</head>
<body>
    <div class="card">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
