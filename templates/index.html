{% extends "base.html" %}
{% block content %}
<h1>📝 문장 순서 맞추기</h1>
<p class="subtitle">지문(여러 문장)을 통째로 붙여넣으면 문장 단위로 끊어서 퀴즈를 만들어줘요</p>

{% if error %}
<div class="error">{{ error }}</div>
{% endif %}

<form method="post">
    <textarea name="text" rows="10" placeholder="여기에 지문을 붙여넣으세요. 마침표(.)나 느낌표(!), 물음표(?)로 문장이 나뉩니다." required></textarea>
    <button type="submit">퀴즈 시작하기</button>
</form>
{% endblock %}
