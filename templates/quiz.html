{% extends "base.html" %}
{% block content %}
<h1>🔀 섞인 문장</h1>
<div class="progress">문제 {{ progress }} / {{ total }}</div>
 
{% if feedback %}
    <div class="feedback {{ 'correct' if is_correct else 'wrong' }}">
        {{ feedback }}
        {% if correct_answer %}
        <span class="correct-answer">정답: {{ correct_answer }}</span>
        {% endif %}
    </div>
{% endif %}
 
<div class="word-count-info">총 <strong id="total-words">0</strong>단어</div>
 
<div class="shuffled-box" id="shuffled-box">
    {% for word in shuffled %}
        <span class="word-chip" onclick="toggleWord(this)">{{ word }}</span>
    {% endfor %}
</div>
 
<form method="post" onsubmit="return submitAnswer()">
    <div class="input-wrap">
        <input type="text" name="answer" id="answer-input" placeholder="올바른 순서로 입력하세요" autocomplete="off" autofocus required oninput="updateCount()">
        <span class="count-badge" id="word-count">0 / <span id="wc-total">0</span></span>
    </div>
    <button type="submit">제출</button>
</form>
 
<script>
const chips = document.querySelectorAll('.word-chip');
const totalWords = chips.length;
document.getElementById('total-words').textContent = totalWords;
document.getElementById('wc-total').textContent = totalWords;
 
function toggleWord(el) {
    el.classList.toggle('used');
}
 
function updateCount() {
    const val = document.getElementById('answer-input').value.trim();
    const count = val === '' ? 0 : val.split(/\s+/).length;
    document.getElementById('word-count').childNodes[0].textContent = count + ' / ';
    document.getElementById('wc-total').textContent = totalWords;
}
 
function submitAnswer() {
    // 제출 전 모든 chip 원상복귀
    chips.forEach(c => c.classList.remove('used'));
    return true;
}
</script>
{% endblock %}
